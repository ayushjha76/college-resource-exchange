<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Public Profile</title>

    <link rel="stylesheet"
          href="{{ url_for('static',
          filename='css/style.css') }}">
</head>
<body>

<nav class="navbar">

    <div class="logo">
        College Resource Exchange
    </div>

    <div class="nav-links">
        <a href="/dashboard">Dashboard</a>
        <a href="/resources">Resources</a>
        <a href="/logout">Logout</a>
    </div>

</nav>

<div class="profile-card">

    {% if user[3] %}

    <img
        src="{{ url_for(
        'static',
        filename='profile_pictures/' + user[3]
        ) }}"
        class="profile-image">

    {% else %}

    <img
        src="{{ url_for(
        'static',
        filename='profile_pictures/default.png'
        ) }}"
        class="profile-image">

    {% endif %}

    <h1>{{ user[0] }}</h1>

    <p class="profile-subtitle">
        College Resource Exchange Member
    </p>

    <div class="profile-info">

        <p>
            <strong>Branch:</strong>
            {{ user[1] }}
        </p>

        <p>
            <strong>Semester:</strong>
            {{ user[2] }}
        </p>

        <p>
            <strong>Resources Uploaded:</strong>
            {{ total_uploads }}
        </p>

    </div>

</div>

</body>
</html>
