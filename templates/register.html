<!DOCTYPE html>
<html>
<head>
    <title>Register</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

    <div class="form-container">

        <h2>Student Registration</h2>

        <form method="POST" action="/send-otp">

            <input type="text"
                   name="name"
                   placeholder="Full Name"
                   required>

            <input type="email"
                   name="email"
                   placeholder="Email"
                   required>

            <input type="password"
                   name="password"
                   placeholder="Password"
                   required>

            <input type="text"
                   name="branch"
                   placeholder="Branch"
                   required>

            <input type="number"
                   name="semester"
                   placeholder="Semester"
                   required>

            <button type="submit">
                Register
            </button>

        </form>

    </div>

</body>
</html>
