<!DOCTYPE html>
<html>
<head>
    <title>Verify OTP</title>
    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<div class="form-container">

    <h2>Email Verification</h2>

    <form method="POST">

        <input
            type="text"
            name="otp"
            placeholder="Enter OTP"
            required>

        <button type="submit">
            Verify OTP
        </button>

    </form>

</div>

</body>
</html>
